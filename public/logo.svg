<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <!-- Dark background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>

    <!-- Orb glow gradient -->
    <radialGradient id="orbGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#6366f1" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner orb gradient -->
    <radialGradient id="orbInner" cx="45%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#e0c3fc"/>
      <stop offset="30%" stop-color="#a855f7"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>

    <!-- Outer glow filter -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft glow for text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Large ambient glow -->
    <filter id="ambientGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>

    <!-- Sound wave glow -->
    <filter id="waveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle grid/star dots -->
  <circle cx="120" cy="150" r="1.2" fill="#ffffff" opacity="0.3"/>
  <circle cx="680" cy="100" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="200" cy="650" r="1.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="600" cy="700" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="80" r="1.2" fill="#ffffff" opacity="0.15"/>
  <circle cx="700" cy="400" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="80" cy="450" r="1.3" fill="#ffffff" opacity="0.25"/>
  <circle cx="500" cy="120" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="150" cy="350" r="1" fill="#ffffff" opacity="0.15"/>
  <circle cx="650" cy="550" r="1.2" fill="#ffffff" opacity="0.2"/>

  <!-- Ambient glow behind orb -->
  <circle cx="400" cy="340" r="180" fill="#6366f1" opacity="0.15" filter="url(#ambientGlow)"/>
  <circle cx="400" cy="340" r="120" fill="#a855f7" opacity="0.1" filter="url(#ambientGlow)"/>

  <!-- Sound wave rings (outer to inner) -->
  <g filter="url(#waveGlow)" opacity="0.25">
    <ellipse cx="400" cy="340" rx="260" ry="260" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <g filter="url(#waveGlow)" opacity="0.35">
    <ellipse cx="400" cy="340" rx="220" ry="220" fill="none" stroke="#7c3aed" stroke-width="1.8"/>
  </g>
  <g filter="url(#waveGlow)" opacity="0.45">
    <ellipse cx="400" cy="340" rx="180" ry="180" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g filter="url(#waveGlow)" opacity="0.55">
    <ellipse cx="400" cy="340" rx="145" ry="145" fill="none" stroke="#a78bfa" stroke-width="2"/>
  </g>

  <!-- Sound wave arcs (left side) -->
  <g filter="url(#waveGlow)">
    <path d="M 220 260 Q 180 340 220 420" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M 245 280 Q 215 340 245 400" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
    <path d="M 270 300 Q 250 340 270 380" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  </g>

  <!-- Sound wave arcs (right side) -->
  <g filter="url(#waveGlow)">
    <path d="M 580 260 Q 620 340 580 420" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M 555 280 Q 585 340 555 400" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
    <path d="M 530 300 Q 550 340 530 380" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  </g>

  <!-- Sound wave bars (vertical equalizer style) -->
  <g filter="url(#waveGlow)" opacity="0.4">
    <rect x="330" y="290" width="4" height="100" rx="2" fill="#818cf8"/>
    <rect x="342" y="270" width="4" height="140" rx="2" fill="#7c3aed"/>
    <rect x="354" y="250" width="4" height="180" rx="2" fill="#8b5cf6"/>
    <rect x="366" y="265" width="4" height="150" rx="2" fill="#a78bfa"/>
    <rect x="378" y="240" width="4" height="200" rx="2" fill="#c4b5fd"/>
    <rect x="390" y="230" width="4" height="220" rx="2" fill="#ddd6fe"/>
    <rect x="402" y="235" width="4" height="210" rx="2" fill="#c4b5fd"/>
    <rect x="414" y="245" width="4" height="190" rx="2" fill="#a78bfa"/>
    <rect x="426" y="260" width="4" height="160" rx="2" fill="#8b5cf6"/>
    <rect x="438" y="250" width="4" height="180" rx="2" fill="#7c3aed"/>
    <rect x="450" y="275" width="4" height="130" rx="2" fill="#818cf8"/>
    <rect x="462" y="295" width="4" height="90" rx="2" fill="#6366f1"/>
  </g>

  <!-- Main orb outer glow -->
  <circle cx="400" cy="340" r="110" fill="url(#orbGlow)" filter="url(#glowFilter)"/>

  <!-- Main orb -->
  <circle cx="400" cy="340" r="85" fill="url(#orbInner)" opacity="0.95"/>

  <!-- Orb highlight -->
  <ellipse cx="380" cy="310" rx="40" ry="30" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="370" cy="305" rx="20" ry="14" fill="#ffffff" opacity="0.1"/>

  <!-- Orb inner ring -->
  <circle cx="400" cy="340" r="85" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.4"/>
  <circle cx="400" cy="340" r="92" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>

  <!-- ARIA LIFE text -->
  <g filter="url(#textGlow)">
    <!-- ARIA text -->
    <text x="400" y="580" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" letter-spacing="18" fill="#e0e7ff">
      ARIA
    </text>
    <!-- LIFE text -->
    <text x="400" y="650" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="normal" letter-spacing="24" fill="#a5b4fc">
      LIFE
    </text>
  </g>

  <!-- Subtle decorative line between text -->
  <line x1="310" y1="598" x2="490" y2="598" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="601" x2="460" y2="601" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
</svg>